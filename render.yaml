services:
  - type: web
    name: take-home-todo
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run prisma:deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: take-home-todo-db
          property: connectionString

databases:
  - name: take-home-todo-db
    plan: free
